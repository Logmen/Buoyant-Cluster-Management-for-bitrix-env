name: release-validate

# Релиз публикуется ЛОКАЛЬНО из scripts/release.sh (tarball подписывается GPG-ключом
# мейнтейнера, который НЕ хранится на GitHub). Этот workflow — страховочная валидация:
# полный предрелизный набор tests/release_check.sh + совпадение bcm/VERSION с тегом.
# Артефакты/Release он НЕ создаёт (это делает release.sh через gh).
# Гоняется и на тегах (релиз), и на push в main / PR — чтобы ловить регрессии заранее.

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: VERSION matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          FILE_VER="$(tr -d '[:space:]' < bcm/VERSION)"
          if [ "$FILE_VER" != "$VERSION" ]; then
            echo "::error::bcm/VERSION ($FILE_VER) не совпадает с тегом $VERSION"
            exit 1
          fi

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Pre-release checks (tests/release_check.sh)
        # Полный набор: синтаксис, shellcheck, полнота bcm_deploy_to_node, source-ссылки,
        # функции меню, плейсхолдеры, секреты, манифест релиза, публичный ключ и т.д.
        run: bash tests/release_check.sh
